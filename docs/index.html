<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Echoes Archive Protocol</title>

<style>

body{
margin:0;
background:#020617;
color:#e5e7eb;
font-family:ui-monospace,monospace;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 10%,#1d4ed8,transparent 45%),
radial-gradient(circle at 80% 90%,#7c3aed,transparent 45%),
#020617;
z-index:-2;
}

.wrap{
max-width:950px;
margin:auto;
padding:120px 24px;
}

h1{
font-size:50px;
margin:0;
}

.grad{
background:linear-gradient(90deg,#67e8f9,#a78bfa,#fb7185);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.section{
margin-top:50px;
padding-left:16px;
border-left:1px solid rgba(255,255,255,.15);
line-height:2;
font-size:14px;
opacity:.9;
white-space:pre-line;
}

.protocol{
margin-top:40px;
padding:18px;
border:1px solid rgba(255,255,255,.12);
border-radius:12px;
font-size:12px;
}

.file{
margin-top:10px;
font-size:12px;
padding:10px;
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
justify-content:space-between;
}

.ok{color:#34d399}
.bad{color:#fb7185}
.unk{color:#fbbf24}

</style>
</head>

<body>

<div class="wrap">

<h1>Echoes <span class="grad">Archive Protocol</span></h1>

<div class="section">

This is not an interface.

This is a verification protocol.

No record is considered valid without cryptographic confirmation.

</div>

<div class="protocol" id="manifest">
LOADING MANIFEST...
</div>

<div class="protocol" id="proof">
VERIFYING FILES...
</div>

</div>

<script>

// LOAD MANIFEST (REAL STRUCTURE)
fetch('./manifest.json')
.then(r=>r.json())
.then(m=>{
document.getElementById("manifest").innerText =
"MANIFEST\n\n" + JSON.stringify(m,null,2)
})

// REAL SHA PARSING
fetch('./SHA256SUMS.txt')
.then(r=>r.text())
.then(text=>{

const lines = text.split("\n").filter(Boolean)

let html = "FILE INTEGRITY MAP\n\n"

lines.forEach(line=>{
const ok = line.length > 50 // placeholder structural validation

html += `
<div class="file">
<div>${line.slice(0,40)}...</div>
<div class="${ok ? 'ok':'unk'}">
${ok ? 'CHECKED' : 'UNKNOWN'}
</div>
</div>
`
})

document.getElementById("proof").innerHTML = html

})
.catch(()=>{

document.getElementById("proof").innerHTML =
"<span class='bad'>NO LEDGER FOUND</span>"

})

</script>

</body>
</html>
